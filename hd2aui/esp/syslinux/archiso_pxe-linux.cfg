INCLUDE boot/syslinux/archiso_head.cfg

LABEL arch64_nbd
TEXT HELP
Boot the Archuseriso HD2AUI live medium using NBD.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Archuseriso hd2aui live medium (x86_64, NBD)
LINUX ::/arch/boot/x86_64/vmlinuz-linux
INITRD ::/arch/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=arch archisolabel=%RO_LABEL% archiso_nbd_srv=${pxeserver} cms_verify=n
SYSAPPEND 3

LABEL arch64_nfs
TEXT HELP
Boot the Archuseriso HD2AUI live medium using NFS.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Archuseriso HD2AUI live medium (x86_64, NFS)
LINUX ::/arch/boot/x86_64/vmlinuz-linux
INITRD ::/arch/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=arch archiso_nfs_srv=${pxeserver}:/run/archiso/bootmnt cms_verify=n
SYSAPPEND 3

LABEL arch64_http
TEXT HELP
Boot the Archuseriso HD2AUI live medium using HTTP.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Archuseriso HD2AUI live medium (x86_64, HTTP)
LINUX ::/arch/boot/x86_64/vmlinuz-linux
INITRD ::/arch/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=arch archiso_http_srv=http://${pxeserver}/ cms_verify=n
SYSAPPEND 3

INCLUDE boot/syslinux/archiso_tail.cfg
