LABEL arch64p
TEXT HELP
Boot the Archusseriso HD2AUI live medium on BIOS.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Archuseriso HD2AUI live with data persistence (x86_64, BIOS)
LINUX /vmlinuz-linux
INITRD /initramfs-linux.img
APPEND archisobasedir=arch archisolabel=%RO_LABEL% cow_label=%COW_LABEL% cow_flags=defaults overlay.index=0

LABEL arch64
TEXT HELP
Boot the Archuseriso HD2AUI live medium on BIOS.
It allows you to install Arch Linux or perform system maintenance.
ENDTEXT
MENU LABEL Archuseriso HD2AUI live without data persistence (x86_64, BIOS)
LINUX /arch/boot/x86_64/vmlinuz-linux
INITRD /arch/boot/x86_64/initramfs-linux.img
APPEND archisobasedir=arch archisolabel=%RO_LABEL%
